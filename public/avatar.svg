<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="150" height="150" shape-rendering="crispEdges" role="img" aria-label="Pixel-art avatar placeholder">
  <!-- background -->
  <rect width="16" height="16" fill="#1e2238"/>
  <rect x="1" y="1" width="14" height="14" fill="#252a45"/>

  <!-- hair -->
  <rect x="4" y="2" width="8" height="2" fill="#5a3a22"/>
  <rect x="3" y="3" width="10" height="2" fill="#5a3a22"/>
  <rect x="3" y="5" width="1" height="3" fill="#5a3a22"/>
  <rect x="12" y="5" width="1" height="3" fill="#5a3a22"/>

  <!-- face -->
  <rect x="4" y="4" width="8" height="8" fill="#f1c9a5"/>
  <rect x="4" y="11" width="8" height="1" fill="#e0a878"/>

  <!-- glasses -->
  <rect x="4" y="6" width="3" height="2" fill="#11131f"/>
  <rect x="9" y="6" width="3" height="2" fill="#11131f"/>
  <rect x="7" y="6" width="2" height="1" fill="#11131f"/>
  <rect x="5" y="7" width="1" height="1" fill="#5aa9ff"/>
  <rect x="10" y="7" width="1" height="1" fill="#5aa9ff"/>

  <!-- mouth -->
  <rect x="6" y="9" width="4" height="1" fill="#c98a63"/>

  <!-- shirt -->
  <rect x="3" y="12" width="10" height="3" fill="#06d6a0"/>
  <rect x="7" y="12" width="2" height="1" fill="#f1c9a5"/>
  <rect x="6" y="13" width="4" height="1" fill="#05b386"/>
</svg>
