<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="384" height="256" shape-rendering="crispEdges" role="img" aria-label="Pixel-art window onto an overcast cloudy sky">
  <!-- room -->
  <rect width="96" height="64" fill="#1b1f33"/>
  <rect x="0" y="46" width="96" height="18" fill="#14182a"/>

  <!-- window frame -->
  <rect x="3" y="4" width="90" height="40" fill="#3a4266"/>

  <!-- ====== weather-controlled region: CLOUDY ====== -->
  <g id="weather-window">
    <rect id="weather-sky" x="5" y="6" width="86" height="36" fill="#9aa9c2"/>
    <g id="weather-art">
      <!-- big grey cloud, centered -->
      <rect x="44" y="11" width="9" height="1" fill="#eef1f6"/>
      <rect x="40" y="12" width="17" height="1" fill="#eef1f6"/>
      <rect x="37" y="13" width="24" height="1" fill="#d3dae6"/>
      <rect x="35" y="14" width="29" height="1" fill="#c2cad9"/>
      <rect x="35" y="15" width="30" height="1" fill="#b6c0d2"/>
      <rect x="36" y="16" width="28" height="1" fill="#a3aec4"/>
      <rect x="39" y="17" width="22" height="1" fill="#8d9ab4"/>

      <!-- grey cloud, upper-left -->
      <rect x="15" y="26" width="7" height="1" fill="#eef1f6"/>
      <rect x="11" y="27" width="15" height="1" fill="#d3dae6"/>
      <rect x="10" y="28" width="17" height="1" fill="#b6c0d2"/>
      <rect x="12" y="29" width="13" height="1" fill="#97a3bb"/>

      <!-- grey cloud, lower-right -->
      <rect x="73" y="30" width="6" height="1" fill="#eef1f6"/>
      <rect x="69" y="31" width="14" height="1" fill="#d3dae6"/>
      <rect x="68" y="32" width="16" height="1" fill="#b6c0d2"/>
      <rect x="70" y="33" width="12" height="1" fill="#97a3bb"/>
    </g>
  </g>
  <!-- ====== /weather-controlled region ====== -->

  <!-- window mullions -->
  <rect x="25" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="47" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="69" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="5" y="23" width="86" height="2" fill="#3a4266"/>

  <!-- windowsill -->
  <rect x="1" y="42" width="92" height="1" fill="#5a6796"/>
  <rect x="1" y="43" width="92" height="2" fill="#46507a"/>
  <rect x="1" y="45" width="92" height="1" fill="#2b3150"/>
</svg>
