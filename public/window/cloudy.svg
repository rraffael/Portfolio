<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="384" height="256" shape-rendering="crispEdges" role="img" aria-label="Pixel-art window onto an overcast cloudy sky">
  <!-- room: preserved from the current assets -->
  <rect width="96" height="64" fill="#1b1f33"/>
  <rect x="0" y="46" width="96" height="18" fill="#14182a"/>

  <!-- window frame: preserved from the current assets -->
  <rect x="3" y="4" width="90" height="40" fill="#3a4266"/>

  <!-- ====== weather-controlled region: CLOUDY ====== -->
  <g id="weather-window">
    <clipPath id="clip-weather"><rect x="5" y="6" width="86" height="36"/></clipPath>
    <g clip-path="url(#clip-weather)">
      <rect x="5" y="5" width="86" height="8" fill="#7f8fa8"/>
      <rect x="5" y="13" width="86" height="9" fill="#91a0b7"/>
      <rect x="5" y="22" width="86" height="10" fill="#a2adbd"/>
      <rect x="5" y="32" width="86" height="10" fill="#b6bfcc"/>
      <g id="weather-art">

        <rect x="12" y="9" width="21" height="1" fill="#eef1f6"/>
        <rect x="9" y="10" width="27" height="1" fill="#eef1f6"/>
        <rect x="7" y="11" width="31" height="1" fill="#d3dae6"/>
        <rect x="8" y="12" width="29" height="1" fill="#b7c0d1"/>
        <rect x="11" y="13" width="23" height="1" fill="#8f9bb3"/>
    
        <rect x="43" y="7" width="25" height="1" fill="#eef1f6"/>
        <rect x="40" y="8" width="31" height="1" fill="#eef1f6"/>
        <rect x="38" y="9" width="35" height="1" fill="#d3dae6"/>
        <rect x="39" y="10" width="33" height="1" fill="#b7c0d1"/>
        <rect x="42" y="11" width="27" height="1" fill="#8f9bb3"/>
    
        <rect x="64" y="16" width="20" height="1" fill="#eef1f6"/>
        <rect x="61" y="17" width="26" height="1" fill="#eef1f6"/>
        <rect x="59" y="18" width="30" height="1" fill="#d3dae6"/>
        <rect x="60" y="19" width="28" height="1" fill="#b7c0d1"/>
        <rect x="63" y="20" width="22" height="1" fill="#8f9bb3"/>
    
        <rect x="19" y="25" width="12" height="1" fill="#eef1f6"/>
        <rect x="17" y="26" width="16" height="1" fill="#d3dae6"/>
        <rect x="16" y="27" width="18" height="1" fill="#b7c0d1"/>
        <rect x="18" y="28" width="14" height="1" fill="#8f9bb3"/>
    
        <!-- distant horizon -->
        <path d="M5 35 L13 32 L20 34 L28 30 L37 33 L46 31 L55 34 L64 31 L73 33 L91 29 L91 42 L5 42 Z" fill="#8999ad"/>
        <path d="M5 38 L12 36 L22 37 L30 34 L40 37 L50 35 L62 38 L72 35 L83 37 L91 34 L91 42 L5 42 Z" fill="#6a7e94"/>
        <!-- tiny skyline -->
        <rect x="9" y="32" width="3" height="10" fill="#65768e"/>
        <rect x="14" y="35" width="4" height="7" fill="#7b8aa0"/>
        <rect x="22" y="31" width="4" height="11" fill="#65768e"/>
        <rect x="31" y="34" width="3" height="8" fill="#7b8aa0"/>
        <rect x="38" y="30" width="4" height="12" fill="#65768e"/>
        <rect x="51" y="33" width="3" height="9" fill="#7b8aa0"/>
        <rect x="57" y="29" width="5" height="13" fill="#65768e"/>
        <rect x="65" y="34" width="4" height="8" fill="#7b8aa0"/>
        <rect x="74" y="31" width="3" height="11" fill="#65768e"/>
        <rect x="82" y="35" width="5" height="7" fill="#7b8aa0"/>
        <!-- water/low land band -->
        <rect x="5" y="39" width="86" height="3" fill="#7d95ae"/>
        <rect x="5" y="41" width="86" height="1" fill="#526174"/>
    
        <rect x="5" y="6" width="86" height="36" fill="#5d667b" opacity="0.08"/>

      </g>
    </g>
  </g>
  <!-- ====== /weather-controlled region ====== -->

  <!-- window mullions: preserved from the current assets -->
  <rect x="25" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="47" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="69" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="5" y="23" width="86" height="2" fill="#3a4266"/>

  <!-- windowsill: preserved from the current assets -->
  <rect x="1" y="42" width="92" height="1" fill="#5a6796"/>
  <rect x="1" y="43" width="92" height="2" fill="#46507a"/>
  <rect x="1" y="45" width="92" height="1" fill="#2b3150"/>
</svg>