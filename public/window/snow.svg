<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="384" height="256" shape-rendering="crispEdges" role="img" aria-label="Pixel-art window onto a snowy sky">
  <style>
    /* Motion ported from SMIL to CSS so prefers-reduced-motion can freeze it.
       Whole-pixel steps keep shape-rendering:crispEdges sharp. */
    .drift    { animation: drift    var(--d,11s)  linear infinite; }
    .drift-l  { animation: drift-l  var(--d,13s)  linear infinite; }
    .twinkle  { animation: twinkle  var(--d,3s)   ease-in-out var(--b,0s) infinite; }
    .rain     { animation: rain     var(--d,0.7s) linear var(--b,0s) infinite; }
    .snow     { animation: snow     var(--d,3.6s) linear var(--b,0s) infinite; }
    .flash    { animation: flash    var(--d,6s)   linear var(--b,0s) infinite; }
    .flash-sky{ animation: flashsky var(--d,6s)   linear var(--b,0s) infinite; }
    @keyframes drift    { 0%,20%{transform:translateX(0)} 20.01%,40%{transform:translateX(1px)} 40.01%,60%{transform:translateX(2px)} 60.01%,80%{transform:translateX(1px)} 80.01%,100%{transform:translateX(0)} }
    @keyframes drift-l  { 0%,20%{transform:translateX(0)} 20.01%,40%{transform:translateX(-1px)} 40.01%,60%{transform:translateX(-2px)} 60.01%,80%{transform:translateX(-1px)} 80.01%,100%{transform:translateX(0)} }
    @keyframes twinkle  { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes rain     { from{transform:translateY(0)} to{transform:translateY(34px)} }
    @keyframes snow     { 0%{transform:translate(0,0)} 25%{transform:translate(1px,8px)} 50%{transform:translate(0,17px)} 75%{transform:translate(-1px,25px)} 100%{transform:translate(0,34px)} }
    @keyframes flash    { 0%,27%{opacity:0} 30%{opacity:1} 33%{opacity:.2} 36%{opacity:1} 39%,100%{opacity:0} }
    @keyframes flashsky { 0%,27%{opacity:0} 30%{opacity:.2} 33%{opacity:.05} 36%{opacity:.18} 39%,100%{opacity:0} }
    @media (prefers-reduced-motion: reduce) {
      .drift,.drift-l,.twinkle,.rain,.snow,.flash,.flash-sky { animation: none; }
    }
  </style>
  <!-- room: preserved from the current assets -->
  <rect width="96" height="64" fill="#1b1f33"/>
  <rect x="0" y="46" width="96" height="18" fill="#14182a"/>

  <!-- window frame: preserved from the current assets -->
  <rect x="3" y="4" width="90" height="40" fill="#3a4266"/>

  <!-- ====== weather-controlled region: SNOW ====== -->
  <g id="weather-window">
    <clipPath id="clip-weather"><rect x="5" y="6" width="86" height="36"/></clipPath>
    <g clip-path="url(#clip-weather)">
      <rect x="5" y="5" width="86" height="10" fill="#a5c5e8"/>
      <rect x="5" y="15" width="86" height="9" fill="#b9d2ec"/>
      <rect x="5" y="24" width="86" height="10" fill="#cde0f1"/>
      <rect x="5" y="34" width="86" height="8" fill="#e1edf8"/>
      <g id="weather-art">

        <g class="drift" style="--d:13s">
          <rect x="12" y="10" width="16" height="1" fill="#ffffff"/>
          <rect x="10" y="11" width="20" height="1" fill="#edf7ff"/>
          <rect x="9" y="12" width="22" height="1" fill="#cfe8ff"/>
          <rect x="11" y="13" width="18" height="1" fill="#9dcced"/>
        </g>

        <g class="drift-l" style="--d:10s">
          <rect x="50" y="9" width="24" height="1" fill="#ffffff"/>
          <rect x="47" y="10" width="30" height="1" fill="#ffffff"/>
          <rect x="45" y="11" width="34" height="1" fill="#edf7ff"/>
          <rect x="46" y="12" width="32" height="1" fill="#cfe8ff"/>
          <rect x="49" y="13" width="26" height="1" fill="#9dcced"/>
        </g>

        <!-- distant horizon -->
        <path d="M5 35 L13 32 L20 34 L28 30 L37 33 L46 31 L55 34 L64 31 L73 33 L91 29 L91 42 L5 42 Z" fill="#d5e3f0"/>
        <path d="M5 38 L12 36 L22 37 L30 34 L40 37 L50 35 L62 38 L72 35 L83 37 L91 34 L91 42 L5 42 Z" fill="#b6cce0"/>
        <!-- tiny skyline -->
        <rect x="9" y="32" width="3" height="10" fill="#9eb4ce"/>
        <rect x="14" y="35" width="4" height="7" fill="#bdcde0"/>
        <rect x="22" y="31" width="4" height="11" fill="#9eb4ce"/>
        <rect x="31" y="34" width="3" height="8" fill="#bdcde0"/>
        <rect x="38" y="30" width="4" height="12" fill="#9eb4ce"/>
        <rect x="51" y="33" width="3" height="9" fill="#bdcde0"/>
        <rect x="57" y="29" width="5" height="13" fill="#9eb4ce"/>
        <rect x="65" y="34" width="4" height="8" fill="#bdcde0"/>
        <rect x="74" y="31" width="3" height="11" fill="#9eb4ce"/>
        <rect x="82" y="35" width="5" height="7" fill="#bdcde0"/>
        <!-- water/low land band -->
        <rect x="5" y="39" width="86" height="3" fill="#c2d5e7"/>
        <rect x="5" y="41" width="86" height="1" fill="#edf7ff"/>
    <rect x="13" y="15" width="1" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="24" y="17" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="23" y="18" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="36" y="13" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="35" y="14" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="50" y="19" width="1" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="61" y="14" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="60" y="15" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="76" y="17" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="75" y="18" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="84" y="13" width="1" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="17" y="28" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="16" y="29" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="32" y="30" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="31" y="31" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="45" y="28" width="1" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="58" y="32" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="57" y="33" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="72" y="29" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="71" y="30" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="84" y="34" width="1" height="1" fill="#ffffff" opacity="0.95"/>

        <!-- animated falling snow (CSS-driven) -->
        <g fill="#ffffff">
          <rect class="snow" style="--d:3.4s"       x="20" y="7" width="1" height="1"/>
          <rect class="snow" style="--d:4s;--b:-1.2s"   x="38" y="7" width="1" height="1"/>
          <rect class="snow" style="--d:3.1s;--b:-2s"   x="55" y="7" width="1" height="1"/>
          <rect class="snow" style="--d:3.8s;--b:-0.7s" x="68" y="7" width="1" height="1"/>
          <rect class="snow" style="--d:3.5s;--b:-2.6s" x="82" y="7" width="1" height="1"/>
          <rect class="snow" style="--d:4.3s;--b:-3.1s" x="30" y="7" width="1" height="1"/>
        </g>

        <!-- snow resting on horizon and low ledge inside the view -->
        <rect x="5" y="39" width="86" height="1" fill="#ffffff" opacity="0.9"/>
        <rect x="14" y="37" width="8" height="1" fill="#ffffff" opacity="0.9"/>
        <rect x="70" y="36" width="10" height="1" fill="#ffffff" opacity="0.9"/>

      </g>
    </g>
  </g>
  <!-- ====== /weather-controlled region ====== -->

  <!-- window mullions: preserved from the current assets -->
  <rect x="25" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="47" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="69" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="5" y="23" width="86" height="2" fill="#3a4266"/>

  <!-- windowsill: preserved from the current assets -->
  <rect x="1" y="42" width="92" height="1" fill="#5a6796"/>
  <rect x="1" y="43" width="92" height="2" fill="#46507a"/>
  <rect x="1" y="45" width="92" height="1" fill="#2b3150"/>
</svg>