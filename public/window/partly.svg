<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="384" height="256" shape-rendering="crispEdges" role="img" aria-label="Pixel-art window onto a partly cloudy sky">
  <!-- room -->
  <rect width="96" height="64" fill="#1b1f33"/>
  <rect x="0" y="46" width="96" height="18" fill="#14182a"/>

  <!-- window frame -->
  <rect x="3" y="4" width="90" height="40" fill="#3a4266"/>

  <!-- ====== weather-controlled region: PARTLY CLOUDY ====== -->
  <g id="weather-window">
    <rect id="weather-sky" x="5" y="6" width="86" height="36" fill="#7cb8f5"/>
    <g id="weather-art">
      <!-- sun (upper-left, partly tucked behind the cloud) -->
      <rect x="24" y="6" width="2" height="1" fill="#ffe7a3"/>
      <rect x="16" y="11" width="2" height="2" fill="#ffe7a3"/>
      <rect x="30" y="11" width="2" height="2" fill="#ffe7a3"/>
      <rect x="20" y="5" width="2" height="2" fill="#ffe7a3"/>
      <rect x="28" y="9" width="6" height="8" fill="#ffd166"/>
      <rect x="27" y="10" width="8" height="6" fill="#ffd166"/>
      <rect x="29" y="8" width="4" height="10" fill="#ffd166"/>
      <rect x="29" y="10" width="5" height="5" fill="#ffe7a3"/>

      <!-- big hero cloud overlapping the sun -->
      <rect x="41" y="13" width="8" height="1" fill="#ffffff"/>
      <rect x="37" y="14" width="16" height="1" fill="#ffffff"/>
      <rect x="34" y="15" width="24" height="1" fill="#eaf2ff"/>
      <rect x="33" y="16" width="29" height="1" fill="#d8e8ff"/>
      <rect x="33" y="17" width="30" height="1" fill="#c7e0fb"/>
      <rect x="34" y="18" width="28" height="1" fill="#b8dcfe"/>
      <rect x="37" y="19" width="22" height="1" fill="#a9d0f5"/>

      <!-- small cloud, lower-right -->
      <rect x="70" y="31" width="6" height="1" fill="#ffffff"/>
      <rect x="67" y="32" width="12" height="1" fill="#eaf2ff"/>
      <rect x="66" y="33" width="14" height="1" fill="#d8e8ff"/>
      <rect x="68" y="34" width="10" height="1" fill="#b8dcfe"/>
    </g>
  </g>
  <!-- ====== /weather-controlled region ====== -->

  <!-- window mullions -->
  <rect x="25" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="47" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="69" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="5" y="23" width="86" height="2" fill="#3a4266"/>

  <!-- windowsill -->
  <rect x="1" y="42" width="92" height="1" fill="#5a6796"/>
  <rect x="1" y="43" width="92" height="2" fill="#46507a"/>
  <rect x="1" y="45" width="92" height="1" fill="#2b3150"/>
</svg>
