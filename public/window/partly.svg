<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="384" height="256" shape-rendering="crispEdges" role="img" aria-label="Pixel-art window onto a partly cloudy sky">
  <style>
    /* Motion ported from SMIL to CSS so prefers-reduced-motion can freeze it.
       Whole-pixel steps keep shape-rendering:crispEdges sharp. */
    .drift    { animation: drift    var(--d,11s)  linear infinite; }
    .drift-l  { animation: drift-l  var(--d,13s)  linear infinite; }
    .twinkle  { animation: twinkle  var(--d,3s)   ease-in-out var(--b,0s) infinite; }
    .rain     { animation: rain     var(--d,0.7s) linear var(--b,0s) infinite; }
    .snow     { animation: snow     var(--d,3.6s) linear var(--b,0s) infinite; }
    .flash    { animation: flash    var(--d,6s)   linear var(--b,0s) infinite; }
    .flash-sky{ animation: flashsky var(--d,6s)   linear var(--b,0s) infinite; }
    @keyframes drift    { 0%,20%{transform:translateX(0)} 20.01%,40%{transform:translateX(1px)} 40.01%,60%{transform:translateX(2px)} 60.01%,80%{transform:translateX(1px)} 80.01%,100%{transform:translateX(0)} }
    @keyframes drift-l  { 0%,20%{transform:translateX(0)} 20.01%,40%{transform:translateX(-1px)} 40.01%,60%{transform:translateX(-2px)} 60.01%,80%{transform:translateX(-1px)} 80.01%,100%{transform:translateX(0)} }
    @keyframes twinkle  { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes rain     { from{transform:translateY(0)} to{transform:translateY(34px)} }
    @keyframes snow     { 0%{transform:translate(0,0)} 25%{transform:translate(1px,8px)} 50%{transform:translate(0,17px)} 75%{transform:translate(-1px,25px)} 100%{transform:translate(0,34px)} }
    @keyframes flash    { 0%,27%{opacity:0} 30%{opacity:1} 33%{opacity:.2} 36%{opacity:1} 39%,100%{opacity:0} }
    @keyframes flashsky { 0%,27%{opacity:0} 30%{opacity:.2} 33%{opacity:.05} 36%{opacity:.18} 39%,100%{opacity:0} }
    @media (prefers-reduced-motion: reduce) {
      .drift,.drift-l,.twinkle,.rain,.snow,.flash,.flash-sky { animation: none; }
    }
  </style>
  <!-- room: preserved from the current assets -->
  <rect width="96" height="64" fill="#1b1f33"/>
  <rect x="0" y="46" width="96" height="18" fill="#14182a"/>

  <!-- window frame: preserved from the current assets -->
  <rect x="3" y="4" width="90" height="40" fill="#3a4266"/>

  <!-- ====== weather-controlled region: PARTLY ====== -->
  <g id="weather-window">
    <clipPath id="clip-weather"><rect x="5" y="6" width="86" height="36"/></clipPath>
    <g clip-path="url(#clip-weather)">
      <rect x="5" y="5" width="86" height="10" fill="#5faeff"/>
      <rect x="5" y="15" width="86" height="9" fill="#77bdff"/>
      <rect x="5" y="24" width="86" height="10" fill="#91caff"/>
      <rect x="5" y="34" width="86" height="8" fill="#b5dcff"/>
      <g id="weather-art">

        <rect x="27" y="5" width="1" height="3" fill="#fff1b5"/>
        <rect x="27" y="22" width="1" height="3" fill="#ffe38b"/>
        <rect x="19" y="13" width="3" height="1" fill="#ffe38b"/>
        <rect x="36" y="13" width="3" height="1" fill="#ffe38b"/>
        <rect x="23" y="11" width="12" height="6" fill="#ffd166"/>
        <rect x="25" y="9" width="8" height="10" fill="#ffd166"/>
        <rect x="26" y="11" width="6" height="6" fill="#fff1b5"/>

        <g class="drift" style="--d:11s">
          <rect x="36" y="11" width="21" height="1" fill="#ffffff"/>
          <rect x="33" y="12" width="27" height="1" fill="#ffffff"/>
          <rect x="31" y="13" width="31" height="1" fill="#edf7ff"/>
          <rect x="32" y="14" width="29" height="1" fill="#cfe8ff"/>
          <rect x="35" y="15" width="23" height="1" fill="#9dcced"/>
        </g>

        <g class="drift" style="--d:8s">
          <rect x="73" y="13" width="9" height="1" fill="#ffffff"/>
          <rect x="71" y="14" width="13" height="1" fill="#edf7ff"/>
          <rect x="70" y="15" width="15" height="1" fill="#cfe8ff"/>
          <rect x="72" y="16" width="11" height="1" fill="#9dcced"/>
        </g>

        <g class="drift-l" style="--d:14s">
          <rect x="12" y="27" width="8" height="1" fill="#ffffff"/>
          <rect x="10" y="28" width="12" height="1" fill="#edf7ff"/>
          <rect x="9" y="29" width="14" height="1" fill="#cfe8ff"/>
          <rect x="11" y="30" width="10" height="1" fill="#9dcced"/>
        </g>

        <!-- distant horizon -->
        <path d="M5 35 L13 32 L20 34 L28 30 L37 33 L46 31 L55 34 L64 31 L73 33 L91 29 L91 42 L5 42 Z" fill="#69a9c2"/>
        <path d="M5 38 L12 36 L22 37 L30 34 L40 37 L50 35 L62 38 L72 35 L83 37 L91 34 L91 42 L5 42 Z" fill="#488aa8"/>
        <!-- tiny skyline -->
        <rect x="9" y="32" width="3" height="10" fill="#5d86ad"/>
        <rect x="14" y="35" width="4" height="7" fill="#7899ba"/>
        <rect x="22" y="31" width="4" height="11" fill="#5d86ad"/>
        <rect x="31" y="34" width="3" height="8" fill="#7899ba"/>
        <rect x="38" y="30" width="4" height="12" fill="#5d86ad"/>
        <rect x="51" y="33" width="3" height="9" fill="#7899ba"/>
        <rect x="57" y="29" width="5" height="13" fill="#5d86ad"/>
        <rect x="65" y="34" width="4" height="8" fill="#7899ba"/>
        <rect x="74" y="31" width="3" height="11" fill="#5d86ad"/>
        <rect x="82" y="35" width="5" height="7" fill="#7899ba"/>
        <!-- water/low land band -->
        <rect x="5" y="39" width="86" height="3" fill="#63a6d0"/>
        <rect x="5" y="41" width="86" height="1" fill="#3f6a83"/>

      </g>
    </g>
  </g>
  <!-- ====== /weather-controlled region ====== -->

  <!-- window mullions: preserved from the current assets -->
  <rect x="25" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="47" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="69" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="5" y="23" width="86" height="2" fill="#3a4266"/>

  <!-- windowsill: preserved from the current assets -->
  <rect x="1" y="42" width="92" height="1" fill="#5a6796"/>
  <rect x="1" y="43" width="92" height="2" fill="#46507a"/>
  <rect x="1" y="45" width="92" height="1" fill="#2b3150"/>
</svg>