<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="384" height="256" shape-rendering="crispEdges" role="img" aria-label="Pixel-art window onto a snowy moonlit night sky">
  <!-- room: preserved from the current assets -->
  <rect width="96" height="64" fill="#1b1f33"/>
  <rect x="0" y="46" width="96" height="18" fill="#14182a"/>

  <!-- window frame: preserved from the current assets -->
  <rect x="3" y="4" width="90" height="40" fill="#3a4266"/>

  <!-- ====== weather-controlled region: SNOW (night) ====== -->
  <g id="weather-window">
    <clipPath id="clip-weather"><rect x="5" y="6" width="86" height="36"/></clipPath>
    <g clip-path="url(#clip-weather)">
      <rect x="5" y="5" width="86" height="10" fill="#1c2a50"/>
      <rect x="5" y="15" width="86" height="9" fill="#24325c"/>
      <rect x="5" y="24" width="86" height="10" fill="#2e3d68"/>
      <rect x="5" y="34" width="86" height="8" fill="#3a4a78"/>
      <g id="weather-art">

        <!-- moon peeking between the clouds -->
        <rect x="37" y="7" width="6" height="12" fill="#eef4ff"/>
        <rect x="35" y="9" width="10" height="8" fill="#eef4ff"/>
        <rect x="36" y="8" width="8" height="10" fill="#eef4ff"/>
        <rect x="38" y="10" width="2" height="2" fill="#cdd8ec"/>
        <rect x="41" y="13" width="2" height="2" fill="#cdd8ec"/>

        <!-- stars (twinkling) -->
        <rect x="14" y="8"  width="1" height="1" fill="#eaf0ff"><animate attributeName="opacity" values="1;0.3;1" dur="2.7s" repeatCount="indefinite"/></rect>
        <rect x="54" y="16" width="1" height="1" fill="#cfe0ff"><animate attributeName="opacity" values="0.85;0.25;0.85" dur="3.4s" begin="-0.7s" repeatCount="indefinite"/></rect>
        <rect x="70" y="18" width="1" height="1" fill="#cfe0ff" opacity="0.8"/>
        <rect x="86" y="10" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="1;0.4;1" dur="3s" begin="-1.4s" repeatCount="indefinite"/></rect>
        <rect x="24" y="20" width="1" height="1" fill="#cfe0ff" opacity="0.75"/>

        <!-- clouds (moonlit) -->
        <g>
          <animateTransform attributeName="transform" type="translate" values="0 0;1 0;2 0;1 0;0 0" dur="13s" calcMode="discrete" repeatCount="indefinite"/>
          <rect x="12" y="10" width="16" height="1" fill="#dbe6f7"/>
          <rect x="10" y="11" width="20" height="1" fill="#c3d2ea"/>
          <rect x="9" y="12" width="22" height="1" fill="#a6b8d6"/>
          <rect x="11" y="13" width="18" height="1" fill="#8698bb"/>
        </g>

        <g>
          <animateTransform attributeName="transform" type="translate" values="0 0;-1 0;-2 0;-1 0;0 0" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
          <rect x="50" y="9" width="24" height="1" fill="#dbe6f7"/>
          <rect x="47" y="10" width="30" height="1" fill="#dbe6f7"/>
          <rect x="45" y="11" width="34" height="1" fill="#c3d2ea"/>
          <rect x="46" y="12" width="32" height="1" fill="#a6b8d6"/>
          <rect x="49" y="13" width="26" height="1" fill="#8698bb"/>
        </g>

        <!-- distant horizon -->
        <path d="M5 35 L13 32 L20 34 L28 30 L37 33 L46 31 L55 34 L64 31 L73 33 L91 29 L91 42 L5 42 Z" fill="#9db0cc"/>
        <path d="M5 38 L12 36 L22 37 L30 34 L40 37 L50 35 L62 38 L72 35 L83 37 L91 34 L91 42 L5 42 Z" fill="#7d93b4"/>
        <!-- tiny skyline -->
        <rect x="9" y="32" width="3" height="10" fill="#63769a"/>
        <rect x="14" y="35" width="4" height="7" fill="#7e90b0"/>
        <rect x="22" y="31" width="4" height="11" fill="#63769a"/>
        <rect x="31" y="34" width="3" height="8" fill="#7e90b0"/>
        <rect x="38" y="30" width="4" height="12" fill="#63769a"/>
        <rect x="51" y="33" width="3" height="9" fill="#7e90b0"/>
        <rect x="57" y="29" width="5" height="13" fill="#63769a"/>
        <rect x="65" y="34" width="4" height="8" fill="#7e90b0"/>
        <rect x="74" y="31" width="3" height="11" fill="#63769a"/>
        <rect x="82" y="35" width="5" height="7" fill="#7e90b0"/>
        <!-- water/low land band -->
        <rect x="5" y="39" width="86" height="3" fill="#93a7c6"/>
        <rect x="5" y="41" width="86" height="1" fill="#cfe0f4"/>
    <rect x="13" y="15" width="1" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="24" y="17" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="23" y="18" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="61" y="16" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="60" y="17" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="76" y="17" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="75" y="18" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="84" y="13" width="1" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="17" y="28" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="16" y="29" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="32" y="30" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="31" y="31" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="45" y="28" width="1" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="58" y="32" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="57" y="33" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="72" y="29" width="1" height="3" fill="#ffffff" opacity="0.95"/>
        <rect x="71" y="30" width="3" height="1" fill="#ffffff" opacity="0.95"/>
        <rect x="84" y="34" width="1" height="1" fill="#ffffff" opacity="0.95"/>

        <!-- animated falling snow -->
        <g fill="#ffffff">
          <rect x="20" y="7" width="1" height="1">
            <animate attributeName="y" values="6;40" dur="3.4s" begin="0s" repeatCount="indefinite"/>
            <animate attributeName="x" values="20;21;20;19;20" dur="2.3s" repeatCount="indefinite"/>
          </rect>
          <rect x="38" y="7" width="1" height="1">
            <animate attributeName="y" values="6;40" dur="4s" begin="-1.2s" repeatCount="indefinite"/>
            <animate attributeName="x" values="38;37;38;39;38" dur="2.7s" repeatCount="indefinite"/>
          </rect>
          <rect x="55" y="7" width="1" height="1">
            <animate attributeName="y" values="6;40" dur="3.1s" begin="-2s" repeatCount="indefinite"/>
            <animate attributeName="x" values="55;56;55;54;55" dur="2.1s" repeatCount="indefinite"/>
          </rect>
          <rect x="68" y="7" width="1" height="1">
            <animate attributeName="y" values="6;40" dur="3.8s" begin="-0.7s" repeatCount="indefinite"/>
            <animate attributeName="x" values="68;67;68;69;68" dur="2.9s" repeatCount="indefinite"/>
          </rect>
          <rect x="82" y="7" width="1" height="1">
            <animate attributeName="y" values="6;40" dur="3.5s" begin="-2.6s" repeatCount="indefinite"/>
            <animate attributeName="x" values="82;83;82;81;82" dur="2.4s" repeatCount="indefinite"/>
          </rect>
          <rect x="30" y="7" width="1" height="1">
            <animate attributeName="y" values="6;40" dur="4.3s" begin="-3.1s" repeatCount="indefinite"/>
            <animate attributeName="x" values="30;29;30;31;30" dur="2.6s" repeatCount="indefinite"/>
          </rect>
        </g>

        <!-- snow resting on horizon and low ledge inside the view -->
        <rect x="5" y="39" width="86" height="1" fill="#ffffff" opacity="0.9"/>
        <rect x="14" y="37" width="8" height="1" fill="#ffffff" opacity="0.9"/>
        <rect x="70" y="36" width="10" height="1" fill="#ffffff" opacity="0.9"/>

      </g>
    </g>
  </g>
  <!-- ====== /weather-controlled region ====== -->

  <!-- window mullions: preserved from the current assets -->
  <rect x="25" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="47" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="69" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="5" y="23" width="86" height="2" fill="#3a4266"/>

  <!-- windowsill: preserved from the current assets -->
  <rect x="1" y="42" width="92" height="1" fill="#5a6796"/>
  <rect x="1" y="43" width="92" height="2" fill="#46507a"/>
  <rect x="1" y="45" width="92" height="1" fill="#2b3150"/>
</svg>