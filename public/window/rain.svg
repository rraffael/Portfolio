<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="384" height="256" shape-rendering="crispEdges" role="img" aria-label="Pixel-art window onto a rainy sky">
  <!-- room: preserved from the current assets -->
  <rect width="96" height="64" fill="#1b1f33"/>
  <rect x="0" y="46" width="96" height="18" fill="#14182a"/>

  <!-- window frame: preserved from the current assets -->
  <rect x="3" y="4" width="90" height="40" fill="#3a4266"/>

  <!-- ====== weather-controlled region: RAIN ====== -->
  <g id="weather-window">
    <clipPath id="clip-weather"><rect x="5" y="6" width="86" height="36"/></clipPath>
    <g clip-path="url(#clip-weather)">
      <rect x="5" y="5" width="86" height="9" fill="#40506c"/>
      <rect x="5" y="14" width="86" height="10" fill="#53647f"/>
      <rect x="5" y="24" width="86" height="10" fill="#65768e"/>
      <rect x="5" y="34" width="86" height="8" fill="#75859b"/>
      <g id="weather-art">

        <g>
          <animateTransform attributeName="transform" type="translate" values="0 0;1 0;2 0;1 0;0 0" dur="12s" calcMode="discrete" repeatCount="indefinite"/>
          <rect x="10" y="7" width="27" height="1" fill="#a4aec2"/>
          <rect x="7" y="8" width="33" height="1" fill="#a4aec2"/>
          <rect x="5" y="9" width="37" height="1" fill="#7d88a4"/>
          <rect x="6" y="10" width="35" height="1" fill="#56617f"/>
          <rect x="9" y="11" width="29" height="1" fill="#394361"/>

          <rect x="40" y="8" width="32" height="1" fill="#a4aec2"/>
          <rect x="37" y="9" width="38" height="1" fill="#a4aec2"/>
          <rect x="35" y="10" width="42" height="1" fill="#7d88a4"/>
          <rect x="36" y="11" width="40" height="1" fill="#56617f"/>
          <rect x="39" y="12" width="34" height="1" fill="#394361"/>

          <rect x="64" y="14" width="21" height="1" fill="#a4aec2"/>
          <rect x="61" y="15" width="27" height="1" fill="#a4aec2"/>
          <rect x="59" y="16" width="31" height="1" fill="#7d88a4"/>
          <rect x="60" y="17" width="29" height="1" fill="#56617f"/>
          <rect x="63" y="18" width="23" height="1" fill="#394361"/>
        </g>
    
        <!-- distant horizon -->
        <path d="M5 35 L13 32 L20 34 L28 30 L37 33 L46 31 L55 34 L64 31 L73 33 L91 29 L91 42 L5 42 Z" fill="#61738d"/>
        <path d="M5 38 L12 36 L22 37 L30 34 L40 37 L50 35 L62 38 L72 35 L83 37 L91 34 L91 42 L5 42 Z" fill="#4a5f77"/>
        <!-- tiny skyline -->
        <rect x="9" y="32" width="3" height="10" fill="#45556d"/>
        <rect x="14" y="35" width="4" height="7" fill="#596881"/>
        <rect x="22" y="31" width="4" height="11" fill="#45556d"/>
        <rect x="31" y="34" width="3" height="8" fill="#596881"/>
        <rect x="38" y="30" width="4" height="12" fill="#45556d"/>
        <rect x="51" y="33" width="3" height="9" fill="#596881"/>
        <rect x="57" y="29" width="5" height="13" fill="#45556d"/>
        <rect x="65" y="34" width="4" height="8" fill="#596881"/>
        <rect x="74" y="31" width="3" height="11" fill="#45556d"/>
        <rect x="82" y="35" width="5" height="7" fill="#596881"/>
        <!-- water/low land band -->
        <rect x="5" y="39" width="86" height="3" fill="#4c6c8d"/>
        <rect x="5" y="41" width="86" height="1" fill="#344458"/>
    <rect x="12" y="16" width="1" height="2" fill="#9fd4f5" opacity="0.95"/>
        <rect x="11" y="18" width="1" height="2" fill="#9fd4f5" opacity="0.75"/>
        <rect x="21" y="20" width="1" height="2" fill="#bfe6ff" opacity="0.95"/>
        <rect x="20" y="22" width="1" height="2" fill="#bfe6ff" opacity="0.75"/>
        <rect x="32" y="17" width="1" height="2" fill="#9fd4f5" opacity="0.95"/>
        <rect x="31" y="19" width="1" height="2" fill="#9fd4f5" opacity="0.75"/>
        <rect x="41" y="22" width="1" height="2" fill="#bfe6ff" opacity="0.95"/>
        <rect x="40" y="24" width="1" height="2" fill="#bfe6ff" opacity="0.75"/>
        <rect x="55" y="18" width="1" height="2" fill="#9fd4f5" opacity="0.95"/>
        <rect x="54" y="20" width="1" height="2" fill="#9fd4f5" opacity="0.75"/>
        <rect x="64" y="23" width="1" height="2" fill="#bfe6ff" opacity="0.95"/>
        <rect x="63" y="25" width="1" height="2" fill="#bfe6ff" opacity="0.75"/>
        <rect x="78" y="19" width="1" height="2" fill="#9fd4f5" opacity="0.95"/>
        <rect x="77" y="21" width="1" height="2" fill="#9fd4f5" opacity="0.75"/>
        <rect x="16" y="30" width="1" height="2" fill="#bfe6ff" opacity="0.95"/>
        <rect x="15" y="32" width="1" height="2" fill="#bfe6ff" opacity="0.75"/>
        <rect x="29" y="27" width="1" height="2" fill="#9fd4f5" opacity="0.95"/>
        <rect x="28" y="29" width="1" height="2" fill="#9fd4f5" opacity="0.75"/>
        <rect x="37" y="33" width="1" height="2" fill="#bfe6ff" opacity="0.95"/>
        <rect x="36" y="35" width="1" height="2" fill="#bfe6ff" opacity="0.75"/>
        <rect x="50" y="29" width="1" height="2" fill="#9fd4f5" opacity="0.95"/>
        <rect x="49" y="31" width="1" height="2" fill="#9fd4f5" opacity="0.75"/>
        <rect x="61" y="34" width="1" height="2" fill="#bfe6ff" opacity="0.95"/>
        <rect x="60" y="36" width="1" height="2" fill="#bfe6ff" opacity="0.75"/>
        <rect x="73" y="30" width="1" height="2" fill="#9fd4f5" opacity="0.95"/>
        <rect x="72" y="32" width="1" height="2" fill="#9fd4f5" opacity="0.75"/>
        <rect x="84" y="35" width="1" height="2" fill="#bfe6ff" opacity="0.95"/>
        <rect x="83" y="37" width="1" height="2" fill="#bfe6ff" opacity="0.75"/>
        
        <!-- animated falling rain -->
        <g>
          <rect x="18" y="7" width="1" height="3" fill="#bfe6ff"><animate attributeName="y" values="6;40" dur="0.65s" begin="0s" repeatCount="indefinite"/></rect>
          <rect x="27" y="7" width="1" height="3" fill="#9fd4f5"><animate attributeName="y" values="6;40" dur="0.8s" begin="-0.3s" repeatCount="indefinite"/></rect>
          <rect x="39" y="7" width="1" height="3" fill="#bfe6ff"><animate attributeName="y" values="6;40" dur="0.7s" begin="-0.5s" repeatCount="indefinite"/></rect>
          <rect x="52" y="7" width="1" height="3" fill="#9fd4f5"><animate attributeName="y" values="6;40" dur="0.6s" begin="-0.15s" repeatCount="indefinite"/></rect>
          <rect x="63" y="7" width="1" height="3" fill="#bfe6ff"><animate attributeName="y" values="6;40" dur="0.85s" begin="-0.55s" repeatCount="indefinite"/></rect>
          <rect x="74" y="7" width="1" height="3" fill="#9fd4f5"><animate attributeName="y" values="6;40" dur="0.72s" begin="-0.4s" repeatCount="indefinite"/></rect>
          <rect x="83" y="7" width="1" height="3" fill="#bfe6ff"><animate attributeName="y" values="6;40" dur="0.78s" begin="-0.62s" repeatCount="indefinite"/></rect>
        </g>

        <rect x="5" y="6" width="86" height="36" fill="#1b2438" opacity="0.16"/>

      </g>
    </g>
  </g>
  <!-- ====== /weather-controlled region ====== -->

  <!-- window mullions: preserved from the current assets -->
  <rect x="25" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="47" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="69" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="5" y="23" width="86" height="2" fill="#3a4266"/>

  <!-- windowsill: preserved from the current assets -->
  <rect x="1" y="42" width="92" height="1" fill="#5a6796"/>
  <rect x="1" y="43" width="92" height="2" fill="#46507a"/>
  <rect x="1" y="45" width="92" height="1" fill="#2b3150"/>
</svg>