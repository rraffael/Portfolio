<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="384" height="256" shape-rendering="crispEdges" role="img" aria-label="Pixel-art window onto a foggy sky">
  <!-- room -->
  <rect width="96" height="64" fill="#1b1f33"/>
  <rect x="0" y="46" width="96" height="18" fill="#14182a"/>

  <!-- window frame -->
  <rect x="3" y="4" width="90" height="40" fill="#3a4266"/>

  <!-- ====== weather-controlled region: FOG ====== -->
  <g id="weather-window">
    <rect id="weather-sky" x="5" y="6" width="86" height="36" fill="#c2c9d4"/>
    <g id="weather-art">
      <!-- pale sun disc, barely showing through the haze -->
      <rect x="66" y="10" width="8" height="8" fill="#dfe4ec"/>
      <rect x="67" y="9" width="6" height="10" fill="#dfe4ec"/>
      <rect x="65" y="11" width="10" height="6" fill="#dfe4ec"/>

      <!-- drifting fog bands -->
      <rect x="8" y="11" width="60" height="2" fill="#d7dce4" opacity="0.75"/>
      <rect x="20" y="16" width="68" height="2" fill="#cdd3dd" opacity="0.7"/>
      <rect x="5" y="21" width="55" height="2" fill="#dde1e8" opacity="0.8"/>
      <rect x="30" y="27" width="58" height="2" fill="#cdd3dd" opacity="0.7"/>
      <rect x="10" y="33" width="64" height="2" fill="#d7dce4" opacity="0.75"/>
      <rect x="40" y="38" width="44" height="2" fill="#dde1e8" opacity="0.8"/>
    </g>
  </g>
  <!-- ====== /weather-controlled region ====== -->

  <!-- window mullions -->
  <rect x="25" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="47" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="69" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="5" y="23" width="86" height="2" fill="#3a4266"/>

  <!-- windowsill -->
  <rect x="1" y="42" width="92" height="1" fill="#5a6796"/>
  <rect x="1" y="43" width="92" height="2" fill="#46507a"/>
  <rect x="1" y="45" width="92" height="1" fill="#2b3150"/>
</svg>
