<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="384" height="256" shape-rendering="crispEdges" role="img" aria-label="Pixel-art window onto a stormy sky with lightning">
  <!-- room -->
  <rect width="96" height="64" fill="#1b1f33"/>
  <rect x="0" y="46" width="96" height="18" fill="#14182a"/>

  <!-- window frame -->
  <rect x="3" y="4" width="90" height="40" fill="#3a4266"/>

  <!-- ====== weather-controlled region: STORM ====== -->
  <g id="weather-window">
    <rect id="weather-sky" x="5" y="6" width="86" height="36" fill="#3a4360"/>
    <g id="weather-art">
      <!-- dark storm cloud across the top -->
      <rect x="38" y="7" width="12" height="1" fill="#9aa3ba"/>
      <rect x="32" y="8" width="22" height="1" fill="#9aa3ba"/>
      <rect x="27" y="9" width="32" height="1" fill="#828ca6"/>
      <rect x="24" y="10" width="40" height="1" fill="#6b7693"/>
      <rect x="23" y="11" width="43" height="1" fill="#5b6685"/>
      <rect x="25" y="12" width="40" height="1" fill="#4c5575"/>
      <rect x="29" y="13" width="33" height="1" fill="#3f4868"/>

      <!-- lightning bolt -->
      <rect x="46" y="15" width="3" height="3" fill="#ffe066"/>
      <rect x="44" y="18" width="4" height="2" fill="#ffd23f"/>
      <rect x="46" y="20" width="4" height="2" fill="#ffe066"/>
      <rect x="43" y="22" width="5" height="2" fill="#ffd23f"/>
      <rect x="45" y="24" width="3" height="3" fill="#ffe066"/>
      <rect x="46" y="27" width="2" height="2" fill="#ffd23f"/>

      <!-- wind-blown rain streaks -->
      <rect x="20" y="22" width="1" height="3" fill="#8fb8e0"/>
      <rect x="26" y="28" width="1" height="3" fill="#8fb8e0"/>
      <rect x="34" y="32" width="1" height="3" fill="#8fb8e0"/>
      <rect x="60" y="24" width="1" height="3" fill="#8fb8e0"/>
      <rect x="68" y="20" width="1" height="3" fill="#8fb8e0"/>
      <rect x="74" y="27" width="1" height="3" fill="#8fb8e0"/>
      <rect x="66" y="34" width="1" height="3" fill="#8fb8e0"/>
    </g>
  </g>
  <!-- ====== /weather-controlled region ====== -->

  <!-- window mullions -->
  <rect x="25" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="47" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="69" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="5" y="23" width="86" height="2" fill="#3a4266"/>

  <!-- windowsill -->
  <rect x="1" y="42" width="92" height="1" fill="#5a6796"/>
  <rect x="1" y="43" width="92" height="2" fill="#46507a"/>
  <rect x="1" y="45" width="92" height="1" fill="#2b3150"/>
</svg>
