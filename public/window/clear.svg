<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="384" height="256" shape-rendering="crispEdges" role="img" aria-label="Pixel-art window onto a clear sunny sky">
  <!-- room -->
  <rect width="96" height="64" fill="#1b1f33"/>
  <rect x="0" y="46" width="96" height="18" fill="#14182a"/>

  <!-- window frame -->
  <rect x="3" y="4" width="90" height="40" fill="#3a4266"/>

  <!-- ====== weather-controlled region: CLEAR ====== -->
  <g id="weather-window">
    <rect id="weather-sky" x="5" y="6" width="86" height="36" fill="#6fb4ff"/>
    <g id="weather-art">
      <!-- sun rays -->
      <rect x="73" y="3" width="2" height="2" fill="#ffe7a3"/>
      <rect x="62" y="13" width="2" height="2" fill="#ffe7a3"/>
      <rect x="84" y="13" width="2" height="2" fill="#ffe7a3"/>
      <rect x="65" y="5" width="2" height="2" fill="#ffe7a3"/>
      <rect x="81" y="5" width="2" height="2" fill="#ffe7a3"/>
      <rect x="65" y="21" width="2" height="2" fill="#ffe7a3"/>
      <rect x="81" y="21" width="2" height="2" fill="#ffe7a3"/>
      <!-- sun body -->
      <rect x="71" y="8" width="6" height="12" fill="#ffd166"/>
      <rect x="70" y="9" width="8" height="10" fill="#ffd166"/>
      <rect x="68" y="11" width="12" height="6" fill="#ffd166"/>
      <rect x="71" y="11" width="6" height="6" fill="#ffe7a3"/>

      <!-- small cloud, upper-left -->
      <rect x="36" y="12" width="5" height="1" fill="#ffffff"/>
      <rect x="33" y="13" width="11" height="1" fill="#eaf2ff"/>
      <rect x="32" y="14" width="13" height="1" fill="#d8e8ff"/>
      <rect x="34" y="15" width="9" height="1" fill="#b8dcfe"/>

      <!-- small cloud, lower-left -->
      <rect x="13" y="30" width="6" height="1" fill="#ffffff"/>
      <rect x="10" y="31" width="12" height="1" fill="#eaf2ff"/>
      <rect x="9" y="32" width="14" height="1" fill="#d8e8ff"/>
      <rect x="11" y="33" width="10" height="1" fill="#b8dcfe"/>
    </g>
  </g>
  <!-- ====== /weather-controlled region ====== -->

  <!-- window mullions -->
  <rect x="25" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="47" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="69" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="5" y="23" width="86" height="2" fill="#3a4266"/>

  <!-- windowsill -->
  <rect x="1" y="42" width="92" height="1" fill="#5a6796"/>
  <rect x="1" y="43" width="92" height="2" fill="#46507a"/>
  <rect x="1" y="45" width="92" height="1" fill="#2b3150"/>
</svg>
