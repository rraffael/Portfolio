<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="384" height="256" shape-rendering="crispEdges" role="img" aria-label="Pixel-art window onto a clear sunny sky">
  <!-- room: preserved from the current assets -->
  <rect width="96" height="64" fill="#1b1f33"/>
  <rect x="0" y="46" width="96" height="18" fill="#14182a"/>

  <!-- window frame: preserved from the current assets -->
  <rect x="3" y="4" width="90" height="40" fill="#3a4266"/>

  <!-- ====== weather-controlled region: CLEAR ====== -->
  <g id="weather-window">
    <clipPath id="clip-weather"><rect x="5" y="6" width="86" height="36"/></clipPath>
    <g clip-path="url(#clip-weather)">
      <rect x="5" y="5" width="86" height="10" fill="#57a8ff"/>
      <rect x="5" y="15" width="86" height="9" fill="#67b6ff"/>
      <rect x="5" y="24" width="86" height="10" fill="#81c8ff"/>
      <rect x="5" y="34" width="86" height="8" fill="#a7d9ff"/>
      <g id="weather-art">

        <rect x="76" y="5" width="1" height="3" fill="#fff1b5"/>
        <rect x="76" y="22" width="1" height="3" fill="#ffe38b"/>
        <rect x="68" y="13" width="3" height="1" fill="#ffe38b"/>
        <rect x="85" y="13" width="3" height="1" fill="#ffe38b"/>
        <rect x="72" y="11" width="12" height="6" fill="#ffd166"/>
        <rect x="74" y="9" width="8" height="10" fill="#ffd166"/>
        <rect x="75" y="11" width="6" height="6" fill="#fff1b5"/>
    
        <rect x="14" y="15" width="7" height="1" fill="#ffffff"/>
        <rect x="12" y="16" width="11" height="1" fill="#edf7ff"/>
        <rect x="11" y="17" width="13" height="1" fill="#cfe8ff"/>
        <rect x="13" y="18" width="9" height="1" fill="#9dcced"/>
    
        <rect x="45" y="12" width="6" height="1" fill="#ffffff"/>
        <rect x="43" y="13" width="10" height="1" fill="#edf7ff"/>
        <rect x="42" y="14" width="12" height="1" fill="#cfe8ff"/>
        <rect x="44" y="15" width="8" height="1" fill="#9dcced"/>
    
        <!-- distant horizon -->
        <path d="M5 35 L13 32 L20 34 L28 30 L37 33 L46 31 L55 34 L64 31 L73 33 L91 29 L91 42 L5 42 Z" fill="#58a9c8"/>
        <path d="M5 38 L12 36 L22 37 L30 34 L40 37 L50 35 L62 38 L72 35 L83 37 L91 34 L91 42 L5 42 Z" fill="#3b8eb1"/>
        <!-- tiny skyline -->
        <rect x="9" y="32" width="3" height="10" fill="#4e83ad"/>
        <rect x="14" y="35" width="4" height="7" fill="#6a9bc0"/>
        <rect x="22" y="31" width="4" height="11" fill="#4e83ad"/>
        <rect x="31" y="34" width="3" height="8" fill="#6a9bc0"/>
        <rect x="38" y="30" width="4" height="12" fill="#4e83ad"/>
        <rect x="51" y="33" width="3" height="9" fill="#6a9bc0"/>
        <rect x="57" y="29" width="5" height="13" fill="#4e83ad"/>
        <rect x="65" y="34" width="4" height="8" fill="#6a9bc0"/>
        <rect x="74" y="31" width="3" height="11" fill="#4e83ad"/>
        <rect x="82" y="35" width="5" height="7" fill="#6a9bc0"/>
        <!-- water/low land band -->
        <rect x="5" y="39" width="86" height="3" fill="#55a7d5"/>
        <rect x="5" y="41" width="86" height="1" fill="#386985"/>
    
        <rect x="11" y="36" width="1" height="1" fill="#bde9ff"/>
        <rect x="57" y="36" width="2" height="1" fill="#bde9ff"/>

      </g>
    </g>
  </g>
  <!-- ====== /weather-controlled region ====== -->

  <!-- window mullions: preserved from the current assets -->
  <rect x="25" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="47" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="69" y="6" width="2" height="36" fill="#3a4266"/>
  <rect x="5" y="23" width="86" height="2" fill="#3a4266"/>

  <!-- windowsill: preserved from the current assets -->
  <rect x="1" y="42" width="92" height="1" fill="#5a6796"/>
  <rect x="1" y="43" width="92" height="2" fill="#46507a"/>
  <rect x="1" y="45" width="92" height="1" fill="#2b3150"/>
</svg>